      - generic [ref=e23]:
        - heading "Information Collection" [level=2] [ref=e24]
        - paragraph [ref=e25]: We collect only the information you voluntarily provide when creating an account — your email address and password. We do not use tracking cookies, analytics pixels, or third-party advertising networks. Your data stays in your own Cloudflare D1 database.
        - heading "Use of Information" [level=2] [ref=e26]
        - paragraph [ref=e27]: Your information is used solely to operate and improve the service. We use your email to send account-related notifications such as password reset emails. We will never sell, rent, or share your personal data with third parties for marketing purposes.
        - heading "Data Protection" [level=2] [ref=e28]
        - paragraph [ref=e29]: Passwords are hashed using industry-standard algorithms before storage. All data is encrypted in transit via TLS. Your Cloudflare D1 database is isolated and accessible only by your own Workers. We recommend enabling additional Cloudflare security features for production deployments.
        - heading "Contact" [level=2] [ref=e30]
        - paragraph [ref=e31]: If you have questions about this privacy policy or how your data is handled, please reach out via the project's GitHub repository or contact the maintainers directly.
